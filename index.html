<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDLESS COMPLEX - Terminal</title>
    <style>
        /* CONFIGURAÇÕES BASE */
        :root {
            --cyan: #00ffff;
            --dark-bg: #000000;
            --light-bg: #ffffff;
            --sidebar-dark: rgba(0, 15, 15, 0.8);
            --sidebar-light: #f0f0f0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: 0.3s;
        }

        /* TEMA ESCURO (PADRÃO) */
        body.dark-theme {
            background-color: var(--dark-bg);
            color: var(--cyan);
            text-shadow: 0 0 5px var(--cyan);
        }

        /* TEMA CLARO */
        body.light-theme {
            background-color: var(--light-bg);
            color: #000000;
            text-shadow: none;
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* LAYOUT */
        #main-layout {
            display: none; 
            width: 100%;
            height: 100%;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            border-right: 2px solid currentColor;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--sidebar-dark);
        }
        body.light-theme #sidebar { background: var(--sidebar-light); }

        /* ÁREA CENTRAL */
        #content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .video-container {
            border: 1px solid currentColor;
            padding: 10px;
            max-width: 800px;
            width: 100%;
            background: rgba(0,0,0,0.2);
        }

        video { width: 100%; border: 1px solid currentColor; }

        /* ELEMENTOS DE INTERAÇÃO */
        input {
            background: transparent; border: 1px solid currentColor;
            color: inherit; padding: 10px; margin: 10px; outline: none;
            text-align: center; font-family: inherit;
        }

        button {
            background: transparent; border: 1px solid currentColor;
            color: inherit; padding: 8px 12px; cursor: pointer;
            font-family: inherit; transition: 0.2s;
            text-transform: uppercase; margin-bottom: 5px;
        }

        button:hover {
            background: currentColor;
            color: var(--dark-bg);
        }
        body.light-theme button:hover { color: var(--light-bg); }

        .settings-panel {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px dashed currentColor;
        }

        hr { border: 0; border-top: 1px solid currentColor; width: 100%; }
    </style>
</head>
<body class="dark-theme">

    <div id="login-overlay">
        <h1>ENDLESS COMPLEX</h1>
        <p id="txt-identify">IDENTIFY YOURSELF</p>
        <input type="text" id="user-id" placeholder="EMPLOYEE ID">
        <input type="password" id="user-pass" placeholder="PASSWORD">
        <button id="btn-connect" onclick="checkLogin()">CONNECT TO SERVER</button>
        
        <div style="margin-top: 20px;">
            <button onclick="toggleLanguage()">EN / PT</button>
        </div>
    </div>

    <div id="main-layout">
        <aside id="sidebar">
            <h3>C.L.4.R.A OS</h3>
            <hr>
            <p id="txt-logs" style="font-size: 0.8em;">RECORDING LOGS:</p>
            <button onclick="showVideo()">LOG_SHOPPING_SOS</button>

            <div class="settings-panel">
                <p id="txt-settings" style="font-size: 0.8em;">SETTINGS:</p>
                <button onclick="toggleTheme()">THEME</button>
                <button onclick="toggleLanguage()">LANG</button>
                <button onclick="location.reload()" style="color: #ff5555; border-color: #ff5555;">LOGOUT</button>
            </div>
        </aside>

        <main id="content-area">
            <div id="welcome-msg">
                <h2 id="txt-welcome">SELECT A FILE IN THE SIDEBAR</h2>
                <p id="txt-waiting">Awaiting command from C.L.4.R.A...</p>
            </div>

            <div id="video-window" class="video-container" style="display: none;">
                <div style="display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 5px;">
                    <span>FILE: sos.mp4</span>
                    <span id="txt-archived" style="color: #ffaa00;">ARCHIVED RECORDING</span>
                </div>
                <video id="security-video" controls>
                    <source src="videos/sos.mp4" type="video/mp4">
                </video>
                <p style="font-size: 0.7em; opacity: 0.7; margin-top: 5px;">LOCATION: SHOPPING NOVALIS | DIR: /videos/sos.mp4</p>
            </div>
        </main>
    </div>

    <script>
        let currentLang = 'en';

        const translations = {
            en: {
                identify: "IDENTIFY YOURSELF",
                id_place: "EMPLOYEE ID",
                pass_place: "PASSWORD",
                connect: "CONNECT TO SERVER",
                logs: "RECORDING LOGS:",
                settings: "SETTINGS:",
                welcome: "SELECT A FILE IN THE SIDEBAR",
                waiting: "Awaiting command from C.L.4.R.A...",
                archived: "ARCHIVED RECORDING",
                denied: "ACCESS DENIED."
            },
            pt: {
                identify: "IDENTIFIQUE-SE",
                id_place: "ID DO FUNCIONÁRIO",
                pass_place: "SENHA",
                connect: "CONECTAR AO SERVIDOR",
                logs: "LOGS DE GRAVAÇÃO:",
                settings: "CONFIGURAÇÕES:",
                welcome: "SELECIONE UM ARQUIVO NO MENU LATERAL",
                waiting: "Aguardando comando da C.L.4.R.A...",
                archived: "GRAVAÇÃO ARQUIVADA",
                denied: "ACESSO NEGADO."
            }
        };

        function checkLogin() {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            if (id === "7782" && pass === "20300190") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-layout').style.display = 'flex';
            } else {
                alert(translations[currentLang].denied);
            }
        }

        function showVideo() {
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('video-window').style.display = 'block';
            document.getElementById('security-video').load();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
        }

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'pt' : 'en';
            const t = translations[currentLang];
            
            document.getElementById('txt-identify').innerText = t.identify;
            document.getElementById('user-id').placeholder = t.id_place;
            document.getElementById('user-pass').placeholder = t.pass_place;
            document.getElementById('btn-connect').innerText = t.connect;
            document.getElementById('txt-logs').innerText = t.logs;
            document.getElementById('txt-settings').innerText = t.settings;
            document.getElementById('txt-welcome').innerText = t.welcome;
            document.getElementById('txt-waiting').innerText = t.waiting;
            document.getElementById('txt-archived').innerText = t.archived;
        }
    </script>
</body>
</html>
