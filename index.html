<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDLESS COMPLEX - Terminal de Arquivos</title>
    <style>
        body {
            background-color: black;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            text-shadow: 0 0 5px #00ffff;
            overflow: hidden;
        }

        /* LOGIN */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* LAYOUT PRINCIPAL */
        #main-layout {
            display: none; 
            width: 100%;
            height: 100%;
        }

        /* MENU LATERAL (CANTO ESQUERDO) */
        #sidebar {
            width: 250px;
            border-right: 2px solid #00ffff;
            padding: 20px;
            background: rgba(0, 15, 15, 0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* ÁREA CENTRAL */
        #content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: radial-gradient(circle, #001a1a 0%, #000 100%);
        }

        .video-container {
            border: 1px solid #00ffff;
            background: black;
            padding: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            max-width: 800px;
            width: 100%;
        }

        .video-header {
            border-bottom: 1px solid #00ffff;
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
        }

        video {
            width: 100%;
            display: block;
            border: 1px solid #003333;
        }

        input {
            background: #001a1a; border: 1px solid #00ffff;
            color: #00ffff; padding: 10px; margin: 10px; outline: none;
            text-align: center;
        }

        button {
            background: transparent; border: 1px solid #00ffff;
            color: #00ffff; padding: 8px 15px; cursor: pointer;
            font-family: inherit; transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: #00ffff; color: black; box-shadow: 0 0 10px #00ffff; }

        hr { border: 0; border-top: 1px solid #00ffff; width: 100%; }

        #welcome-msg { text-align: center; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1>ENDLESS COMPLEX</h1>
        <p>IDENTIFIQUE-SE</p>
        <input type="text" id="user-id" placeholder="ID DO FUNCIONÁRIO">
        <input type="password" id="user-pass" placeholder="SENHA">
        <button onclick="checkLogin()">CONECTAR AO SERVIDOR</button>
    </div>

    <div id="main-layout">
        
        <aside id="sidebar">
            <h3>C.L.4.R.A OS</h3>
            <hr>
            <p style="font-size: 0.8em;">LOGS DE GRAVAÇÃO:</p>
            <button onclick="showVideo()">LOG_SHOPPING_SOS</button>
            <button onclick="location.reload()" style="margin-top: auto; border-color: #550000; color: #ff5555;">LOGOUT</button>
        </aside>

        <main id="content-area">
            <div id="welcome-msg">
                <h2>SELECIONE UM ARQUIVO NO MENU LATERAL</h2>
                <p>Aguardando comando da IA C.L.4.R.A...</p>
            </div>

            <div id="video-window" class="video-container" style="display: none;">
                <div class="video-header">
                    <span>ARQUIVO: sos.mp4</span>
                    <span style="color: #ffaa00;">GRAVAÇÃO ARQUIVADA</span>
                </div>
                
                <video id="security-video" controls>
                    <source src="videos/sos.mp4" type="video/mp4">
                    ERRO: ARQUIVO NÃO ENCONTRADO
                </video>
                
                <div style="margin-top: 10px; font-size: 0.8em; opacity: 0.8;">
                    INSTALAÇÃO: SHOPPING NOVALIS | DIRETÓRIO: /videos/sos.mp4
                </div>
            </div>
        </main>

    </div>

    <script>
        function checkLogin() {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;

            // Suas credenciais: 7782 / 20300190
            if (id === "7782" && pass === "20300190") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-layout').style.display = 'flex';
            } else {
                alert("ACESSO NEGADO.");
            }
        }

        function showVideo() {
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('video-window').style.display = 'block';
            
            const video = document.getElementById('security-video');
            video.load();
        }
    </script>
</body>
</html>
